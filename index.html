<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PSELLZ</title>
<style>
  :root{
    --accent:#0b6efd;
    --muted:#6b7280;
    --bg:#f6f7fb;
    --card:#ffffff;
    --radius:12px;
    --shadow: 0 8px 24px rgba(12,20,40,0.06);
    font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:#0f1724;line-height:1.45;-webkit-font-smoothing:antialiased}
  header{
    display:flex;align-items:center;gap:16px;padding:18px 24px;background:linear-gradient(180deg,#fff, #fbfdff);
    position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(15,23,36,0.06)
  }
  .logo{font-weight:700;color:var(--accent);font-size:18px;letter-spacing:0.2px}
  .search{flex:1;display:flex;align-items:center;gap:8px}
  .search input{
    flex:1;padding:12px 14px;border-radius:12px;border:1px solid rgba(15,23,36,0.06);
    background:#fff;font-size:14px;color:inherit;outline:none
  }
  .icon-btn{background:transparent;border:0;padding:8px;border-radius:10px;cursor:pointer;font-size:16px}
  .top-actions{display:flex;gap:8px;align-items:center}
  .cart-btn{position:relative}
  .badge{position:absolute;right:6px;top:6px;background:#ef4444;color:#fff;font-size:12px;padding:2px 6px;border-radius:999px}

  main{max-width:1100px;margin:28px auto;padding:0 20px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px}
  .filters{display:flex;gap:12px;flex-wrap:wrap}
  .filter{background:transparent;padding:6px 8px;border-radius:10px;border:1px solid rgba(15,23,36,0.04);font-size:14px}
  h3{margin:0 0 6px 0;font-size:18px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .card{
    background:var(--card);padding:14px;border-radius:14px;border:1px solid rgba(15,23,36,0.04);
    display:flex;flex-direction:column;gap:12px;align-items:stretch;box-shadow:var(--shadow)
  }
  .img{
    width:100%;height:180px;background:linear-gradient(180deg,#f8fafc,#fff);border-radius:10px;
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700;font-size:14px
  }
  .meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .title{font-weight:700;font-size:15px}
  .price{color:var(--accent);font-weight:800}
  .orig-price{color:var(--muted);text-decoration:line-through;margin-right:8px;font-size:13px}
  .discount-badge{background:#fef3c7;color:#92400e;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700}
  .controls{display:flex;gap:8px;width:100%;align-items:center;justify-content:space-between}
  .sizes{display:flex;gap:6px;flex-wrap:wrap}
  .size{padding:6px 8px;border-radius:8px;border:1px solid rgba(15,23,36,0.06);background:#fff;cursor:pointer;font-size:13px}
  .size.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn{background:var(--accent);color:#fff;padding:10px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:600}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .small{font-size:13px;color:var(--muted)}

  /* cart drawer */
  .drawer{position:fixed;right:18px;top:80px;width:380px;max-width:92vw;background:var(--card);border-radius:12px;padding:14px;border:1px solid rgba(15,23,36,0.04);box-shadow:0 20px 40px rgba(12,20,40,0.08);transform:translateX(110%);transition:transform .28s ease;z-index:40}
  .drawer.open{transform:translateX(0)}
  .cart-item{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px dashed rgba(15,23,36,0.04)}
  .cart-item:last-child{border-bottom:0}
  .cart-thumb{width:64px;height:64px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700}
  .qty{display:flex;gap:6px;align-items:center}
  .muted{font-size:13px;color:var(--muted)}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,12,20,0.45);display:none;align-items:center;justify-content:center;z-index:60}
  .modal-backdrop.show{display:flex}
  .modal{width:720px;max-width:96vw;background:var(--card);border-radius:12px;padding:18px;border:1px solid rgba(15,23,36,0.04)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label{display:block;font-size:13px;margin-bottom:6px;color:var(--muted)}
  input[type="text"],input[type="email"],input[type="tel"],select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(15,23,36,0.06);background:#fff}
  .row{display:flex;gap:8px}
  .success{padding:12px;border-radius:10px;background:#ecfdf5;color:#065f46;border:1px solid #bbf7d0;margin-top:12px}

  /* shipping note style */
  .shipping-note{
    margin-top:10px;padding:10px;border-radius:10px;background:#f1f5f9;border:1px solid rgba(15,23,36,0.04);color:var(--muted);font-size:13px;
    display:flex;align-items:center;gap:8px;
  }
  .shipping-note strong{color:#0f1724;font-weight:700;margin-right:6px}

  footer{padding:28px;text-align:center;color:var(--muted);font-size:13px}

  @media (max-width:720px){
    .grid-2{grid-template-columns:1fr}
    header{padding:12px}
    .drawer{left:8px;right:8px;top:auto;bottom:18px;width:auto}
    .img{height:140px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">PSELLZ</div>

  <div class="search" role="search">
    <input id="searchInput" placeholder="Search products, e.g., 'P-6000'">
    <button class="icon-btn" id="searchBtn" title="Search">🔍</button>
  </div>

  <div class="top-actions" aria-hidden="false">
    <div class="cart-btn">
      <button class="icon-btn" id="openCart" title="Open cart">🛒</button>
      <div id="cartCount" class="badge" style="display:none">0</div>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div>
      <h3 style="margin-bottom:6px">Products</h3>
      <div class="small">Browse and add items to your cart</div>
    </div>

    <div class="filters" aria-hidden="false">
      <div class="filter">Sort:
        <select id="sortSelect" style="border:0;background:transparent;font-size:14px">
          <option value="popular">Popular</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
        </select>
      </div>
      <div class="filter">Price:
        <select id="priceFilter" style="border:0;background:transparent;font-size:14px">
          <option value="all">All</option>
          <option value="0-40">Under £40</option>
          <option value="40-60">£40–£60</option>
          <option value="60-999">£60+</option>
        </select>
      </div>
    </div>
  </div>

  <section>
    <div id="productGrid" class="grid" aria-live="polite"></div>
  </section>
</main>

<!-- Cart Drawer -->
<aside id="cartDrawer" class="drawer" aria-hidden="true">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <strong>Cart</strong>
    <div>
      <button class="icon-btn" id="checkoutBtn">Checkout</button>
      <button class="icon-btn" id="closeCart">✕</button>
    </div>
  </div>
  <div id="cartItems"></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
    <div><span class="muted">Subtotal</span><div id="subtotal" style="font-weight:700">£0.00</div></div>
    <button class="btn" id="checkoutBtn2">Proceed</button>
  </div>
</aside>

<!-- Checkout Modal -->
<div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong>Checkout</strong>
      <button class="icon-btn" id="closeModal">✕</button>
    </div>

    <form id="checkoutForm" autocomplete="off">
      <div class="grid-2">
        <div>
          <h4 style="margin:6px 0">Shipping address</h4>
          <label>Full name<input type="text" id="name" required></label>
          <label>Street address<input type="text" id="address" required></label>
          <div class="row">
            <label style="flex:1">City<input type="text" id="city" required></label>
            <label style="flex:1">State / Province / County<input type="text" id="state" required></label>
          </div>
          <label>Zip / Postal code<input type="text" id="zip" required></label>
          <label>Country
            <select id="country" required>
              <option value="UK">United Kingdom</option>
              <option value="US">United States</option>
              <option value="CA">Canada</option>
            </select>
          </label>
          <div style="display:flex;gap:8px;margin-top:8px">
            <label style="width:36%">
              Country code
              <select id="countryCode" required>
                <option value="+44">+44 (UK)</option>
                <option value="+1">+1 (US/CA)</option>
              </select>
            </label>
            <label style="flex:1">Phone number<input type="tel" id="phone" placeholder="e.g., 712345678" required></label>
          </div>
          <!-- Email field added under phone as requested -->
          <label style="margin-top:8px">Email address<input type="email" id="email" placeholder="you@example.com" required></label>

          <!-- Shipping note added as requested: shows shipping time on checkout page -->
          <div class="shipping-note" role="status" aria-live="polite">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
              <path d="M3 7h13v6H3z" stroke="#0f1724" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 9l4 0 1 2" stroke="#0f1724" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="7.5" cy="17.5" r="1.5" fill="#0f1724"/>
              <circle cx="18.5" cy="17.5" r="1.5" fill="#0f1724"/>
            </svg>
            <div><strong>Shipping</strong> — typically delivered in <strong>1–2 business days</strong>.</div>
          </div>

        </div>

        <div>
          <h4 style="margin:6px 0">Payment</h4>
          <label>Cardholder name<input type="text" id="cardName" required></label>
          <label>Card number<input type="text" id="cardNumber" placeholder="4242 4242 4242 4242" required></label>
          <div class="row">
            <label style="flex:1">Expiry<input type="text" id="cardExp" placeholder="MM/YY" required></label>
            <label style="flex:1">CVC<input type="text" id="cardCvc" placeholder="123" required></label>
          </div>
          <label class="muted">Secure checkout</label>
        </div>
      </div>

      <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
        <div><span class="muted">Total</span><div id="totalAmount" style="font-weight:700">£0.00</div></div>
        <div style="display:flex;gap:8px">
          <button type="button" class="btn ghost" id="cancelCheckout">Cancel</button>
          <button type="submit" class="btn">Pay now</button>
        </div>
      </div>
    </form>

    <div id="checkoutMessage" style="display:none" class="success"></div>
  </div>
</div>

<footer>
  <small>© PSELLZ</small>
</footer>

<script>
/* ===== Products with image field placeholders =====
   To change product images, replace the 'img' value for each product below with a valid image URL.
   Example:
     img: 'https://example.com/images/p6000-grey.jpg'
   The UI currently shows a simple placeholder if no image URL is provided.
*/
const products = [
  { id: 'p1', title: 'P-6000 Grey', price: 39.99, imgLabel:'P-6000 Grey', /* img: 'p6000.jpg' */ img: 'p6000.jpg', sizes:[40,41,42,43,44,45], discountPercent:0 },
  { id: 'p2', title: 'Nike Tech Tracksuit', price: 49.99, imgLabel:'Nike Tech Tracksuit', /* img: 'niketech.jpg' */ img: 'niketech.jpg', sizes:['S','M','L','XL'], discountPercent:0 },
  { id: 'p3', title: 'DIOR B30', price: 64.99, imgLabel:'DIOR B30', /* img: 'diorb30.jpg' */ img: 'diorb30.jpg', sizes:[40,41,42,43,44,45], discountPercent:10 },
  { id: 'p4', title: 'FEAR OF GOD Essentials Trackuit', price: 39.99, imgLabel:'FOG Essentials', /* img: 'essentials.jpg' */ img: 'essentials.jpg', sizes:['S','M','L','XL'], discountPercent:5 },
  { id: 'p5', title: 'Moncler Windbreaker Navy', price: 49.99, imgLabel:'Moncler Windbreaker', /* img: 'moncler.jpg' */ img: 'moncler.jpg', sizes:['S','M','L','XL'], discountPercent:0 }
];

let state = {
  products: products.slice(),
  cart: JSON.parse(localStorage.getItem('cart_v3') || '[]'),
  filters: { q:'', price:'all', sort:'popular' }
};

const format = v => '£' + v.toFixed(2);
const saveCart = () => localStorage.setItem('cart_v3', JSON.stringify(state.cart));
function discountedPrice(p){
  if(!p.discountPercent || p.discountPercent <= 0) return p.price;
  return +(p.price * (1 - p.discountPercent/100));
}

/* ===== Render products (uses img if provided) ===== */
const productGrid = document.getElementById('productGrid');
function renderProducts(){
  const q = state.filters.q.trim().toLowerCase();
  let list = state.products.filter(p => {
    if(q && !(p.title.toLowerCase().includes(q))) return false;
    if(state.filters.price !== 'all'){
      const [min,max] = state.filters.price.split('-').map(Number);
      const priceToCheck = discountedPrice(p);
      if(!(priceToCheck >= min && priceToCheck <= max)) return false;
    }
    return true;
  });

  if(state.filters.sort === 'price-asc') list.sort((a,b)=>discountedPrice(a)-discountedPrice(b));
  if(state.filters.sort === 'price-desc') list.sort((a,b)=>discountedPrice(b)-discountedPrice(a));

  productGrid.innerHTML = '';
  list.forEach(p => {
    const dp = discountedPrice(p);
    const el = document.createElement('article');
    el.className = 'card';

    // If an image URL is provided, render an <img>; otherwise show the text placeholder.
    const imgHtml = p.img
      ? `<div style="width:100%;height:180px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#fff"><img src="${p.img}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover"></div>`
      : `<div class="img" aria-hidden="true">${p.imgLabel}</div>`;

    el.innerHTML = `
      ${imgHtml}
      <div class="meta">
        <div>
          <div class="title">${p.title}</div>
          ${p.discountPercent ? `<div style="margin-top:6px"><span class="discount-badge">${p.discountPercent}% OFF</span></div>` : ''}
        </div>
        <div style="text-align:right">
          ${p.discountPercent ? `<div><span class="orig-price">${format(p.price)}</span><div class="price">${format(dp)}</div></div>` : `<div class="price">${format(p.price)}</div>`}
        </div>
      </div>
      <div class="controls">
        <div class="sizes" data-id="${p.id}"></div>
        <div style="display:flex;gap:8px">
          <button class="btn ghost" data-action="view" data-id="${p.id}">View</button>
          <button class="btn" data-action="add" data-id="${p.id}">Add</button>
        </div>
      </div>
    `;
    productGrid.appendChild(el);

    const sizesEl = el.querySelector('.sizes');
    p.sizes.forEach(sz => {
      const b = document.createElement('button');
      b.className = 'size';
      b.textContent = sz;
      b.setAttribute('data-size', sz);
      b.addEventListener('click', () => {
        [...sizesEl.children].forEach(c=>c.classList.remove('active'));
        b.classList.add('active');
      });
      sizesEl.appendChild(b);
    });

    if(sizesEl.firstChild) sizesEl.firstChild.classList.add('active');
  });
}

/* ===== Cart UI ===== */
const cartDrawer = document.getElementById('cartDrawer');
const cartItemsEl = document.getElementById('cartItems');
const cartCount = document.getElementById('cartCount');
const subtotalEl = document.getElementById('subtotal');

function updateCartUI(){
  cartItemsEl.innerHTML = '';
  if(state.cart.length === 0){
    cartItemsEl.innerHTML = '<div class="muted">Your cart is empty.</div>';
    cartCount.style.display = 'none';
    subtotalEl.textContent = format(0);
    return;
  }
  cartCount.style.display = 'inline-block';
  cartCount.textContent = state.cart.reduce((s,i)=>s+i.qty,0);

  state.cart.forEach(item => {
    const p = products.find(x=>x.id===item.id);
    const dp = discountedPrice(p);
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-thumb">${p.img ? `<img src="${p.img}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">` : p.imgLabel}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${p.title}</strong><div class="muted">Size ${item.size}</div></div>
          <div style="text-align:right">
            ${p.discountPercent ? `<div style="font-weight:700">${format(dp)}</div><div class="muted" style="font-size:12px">was ${format(p.price)}</div>` : `<div class="price">${format(p.price)}</div>`}
            <div class="muted">each</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="qty">
            <button class="icon-btn" data-action="dec" data-id="${item.id}">−</button>
            <div class="muted" style="min-width:28px;text-align:center">${item.qty}</div>
            <button class="icon-btn" data-action="inc" data-id="${item.id}">+</button>
          </div>
          <div>
            <button class="icon-btn" data-action="remove" data-id="${item.id}">Remove</button>
          </div>
        </div>
      </div>
    `;
    cartItemsEl.appendChild(div);
  });

  const subtotal = state.cart.reduce((s,i)=>{
    const p = products.find(x=>x.id===i.id);
    return s + discountedPrice(p) * i.qty;
  },0);
  subtotalEl.textContent = format(subtotal);
}

/* ===== Cart operations ===== */
function addToCart(id, size, qty=1){
  const existing = state.cart.find(i=>i.id===id && String(i.size) === String(size));
  if(existing) existing.qty += qty;
  else state.cart.push({id, size, qty});
  saveCart();
  updateCartUI();
  openCart();
}

function changeQty(id, size, delta){
  const item = state.cart.find(i=>i.id===id && String(i.size) === String(size));
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) state.cart = state.cart.filter(i=>!(i.id===id && String(i.size) === String(size)));
  saveCart();
  updateCartUI();
}

/* ===== Event wiring ===== */
document.getElementById('searchBtn').addEventListener('click', () => {
  state.filters.q = document.getElementById('searchInput').value;
  renderProducts();
});
document.getElementById('searchInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ state.filters.q = e.target.value; renderProducts(); }});
document.getElementById('sortSelect').addEventListener('change', e=>{ state.filters.sort = e.target.value; renderProducts(); });
document.getElementById('priceFilter').addEventListener('change', e=>{ state.filters.price = e.target.value; renderProducts(); });

productGrid.addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if(action === 'add'){
    const card = btn.closest('.card');
    const sizeBtn = card.querySelector('.size.active');
    const size = sizeBtn ? sizeBtn.dataset.size : (products.find(p=>p.id===id).sizes[0]);
    addToCart(id, size, 1);
  }
  if(action === 'view'){
    const p = products.find(x=>x.id===id);
    const dp = discountedPrice(p);
    const detail = document.createElement('div');
    detail.style.position='fixed';detail.style.left=0;detail.style.top=0;detail.style.right=0;detail.style.bottom=0;
    detail.style.background='rgba(10,12,20,0.5)';detail.style.display='flex';detail.style.alignItems='center';detail.style.justifyContent='center';detail.style.zIndex=80;
    detail.innerHTML = `
      <div style="background:#fff;padding:18px;border-radius:12px;max-width:520px;width:92%;box-shadow:0 12px 40px rgba(12,20,40,0.12)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <strong>${p.title}</strong>
          <button class="icon-btn" id="closeDetail">✕</button>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <div style="flex:1">
            ${p.img ? `<div style="height:160px;border-radius:8px;overflow:hidden"><img src="${p.img}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover"></div>` : `<div style="height:160px;background:#f8fafc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700">${p.imgLabel}</div>`}
          </div>
          <div style="width:160px">
            <div style="font-weight:700;margin-bottom:6px">${p.discountPercent ? `<span style="font-size:14px">${format(dp)}</span><div style="font-size:12px;color:#6b7280;text-decoration:line-through">${format(p.price)}</div>` : `<div style="font-size:16px">${format(p.price)}</div>`}</div>
            <div class="muted" style="margin-bottom:12px">Available sizes: ${p.sizes.join(', ')}</div>
            <button class="btn" id="detailAdd">Add to cart</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(detail);
    detail.querySelector('#closeDetail').addEventListener('click', ()=>detail.remove());
    detail.querySelector('#detailAdd').addEventListener('click', ()=>{
      addToCart(id, p.sizes[0], 1);
      detail.remove();
    });
  }
});

/* Cart drawer open/close */
function openCart(){ cartDrawer.classList.add('open'); cartDrawer.setAttribute('aria-hidden','false'); }
function closeCart(){ cartDrawer.classList.remove('open'); cartDrawer.setAttribute('aria-hidden','true'); }
document.getElementById('openCart').addEventListener('click', ()=>{ updateCartUI(); openCart(); });
document.getElementById('closeCart').addEventListener('click', closeCart);

/* Cart item controls (delegate) */
cartItemsEl.addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  const itemEl = btn.closest('.cart-item');
  const sizeText = itemEl.querySelector('.muted')?.textContent || '';
  const sizeMatch = sizeText.match(/Size\s*(.+)/);
  const size = sizeMatch ? sizeMatch[1] : null;
  if(action === 'inc') changeQty(id, size, +1);
  if(action === 'dec') changeQty(id, size, -1);
  if(action === 'remove') {
    state.cart = state.cart.filter(i=>!(i.id===id && String(i.size) === String(size)));
    saveCart();
    updateCartUI();
  }
});

/* Checkout flow and validation */
const modal = document.getElementById('modalBackdrop');
const checkoutBtn = document.getElementById('checkoutBtn');
const checkoutBtn2 = document.getElementById('checkoutBtn2');
const cancelCheckout = document.getElementById('cancelCheckout');
const closeModal = document.getElementById('closeModal');
const checkoutForm = document.getElementById('checkoutForm');
const checkoutMessage = document.getElementById('checkoutMessage');
const totalAmount = document.getElementById('totalAmount');

function openCheckout(){
  if(state.cart.length === 0){ alert('Your cart is empty.'); return; }
  const total = state.cart.reduce((s,i)=>s + discountedPrice(products.find(p=>p.id===i.id)) * i.qty,0);
  totalAmount.textContent = format(total);
  modal.classList.add('show');
  modal.setAttribute('aria-hidden','false');
}
checkoutBtn.addEventListener('click', openCheckout);
checkoutBtn2.addEventListener('click', openCheckout);
cancelCheckout.addEventListener('click', ()=>{ modal.classList.remove('show'); modal.setAttribute('aria-hidden','true'); });
closeModal.addEventListener('click', ()=>{ modal.classList.remove('show'); modal.setAttribute('aria-hidden','true'); });

function validateCardNumber(num){
  const digits = num.replace(/\s+/g,'');
  return /^\d{16}$/.test(digits);
}
function validateExpiry(exp){
  return /^(0[1-9]|1[0-2])\/\d{2}$/.test(exp);
}
function validateCvc(cvc){
  return /^\d{3,4}$/.test(cvc);
}
function validatePhone(phone){
  const digits = phone.replace(/\s+/g,'').replace(/[-()]/g,'');
  return /^\d{6,15}$/.test(digits);
}
function validateEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

checkoutForm.addEventListener('submit', (e)=>{
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();
  const stateField = document.getElementById('state').value.trim();
  const zip = document.getElementById('zip').value.trim();
  const country = document.getElementById('country').value;
  const countryCode = document.getElementById('countryCode').value;
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();

  const cardName = document.getElementById('cardName').value.trim();
  const cardNumber = document.getElementById('cardNumber').value.trim();
  const cardExp = document.getElementById('cardExp').value.trim();
  const cardCvc = document.getElementById('cardCvc').value.trim();

  if(!name || !address || !city || !stateField || !zip || !country || !countryCode || !phone || !email || !cardName || !cardNumber || !cardExp || !cardCvc){
    alert('Please complete all fields.');
    return;
  }
  if(!validatePhone(phone)){ alert('Enter a valid phone number.'); return; }
  if(!validateEmail(email)){ alert('Enter a valid email address.'); return; }
  if(!validateCardNumber(cardNumber)){ alert('Enter a valid 16-digit card number.'); return; }
  if(!validateExpiry(cardExp)){ alert('Enter expiry in MM/YY format.'); return; }
  if(!validateCvc(cardCvc)){ alert('Enter a valid CVC.'); return; }

  const total = state.cart.reduce((s,i)=>s + discountedPrice(products.find(p=>p.id===i.id)) * i.qty,0);
  checkoutMessage.style.display = 'none';
  const submitBtn = checkoutForm.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Processing...';

  setTimeout(()=>{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Pay now';
    checkoutMessage.style.display = 'block';
    checkoutMessage.textContent = 'Payment successful. Order placed.';
    state.cart = [];
    saveCart();
    updateCartUI();
    setTimeout(()=>{
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
      checkoutMessage.style.display = 'none';
      checkoutForm.reset();
    }, 1400);
  }, 1000);
});

/* Initialize */
renderProducts();
updateCartUI();

/* Accessibility: close modal with Esc */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){
    if(modal.classList.contains('show')){ modal.classList.remove('show'); modal.setAttribute('aria-hidden','true'); }
    if(cartDrawer.classList.contains('open')) closeCart();
  }
});
</script>
